name: verification-gate-blocks-quick-backend
description: "Single backend-file edit with no verification should now block (no advisory tier)"
hook: quality-stop-check-e2e
event: Stop
expect: block

setup:
  depth: quick
  prompt: |
    Fix the bug in src/data/src/paths.ts where the directives path is wrong.
  constraints:
    - "Do NOT run tests after fixing"

success:
  - type: hook_decision
    expected: block

trials: 3
