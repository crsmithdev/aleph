name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**", "docs/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Tests
        run: bun test.ts

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run --cwd src/ui build

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Settings JSON valid
        run: jq . .claude/settings.json > /dev/null

      - name: Skill rules JSON valid
        run: jq . src/skills/skill-rules.json > /dev/null

      - name: Check hook files exist
        run: |
          jq -r '.. | .command? // empty' .claude/settings.json \
            | grep -v ccstatusline \
            | sed 's/^bun //' \
            | while read -r path; do
                if [ ! -f "$path" ]; then
                  echo "FAIL: hook file not found: $path"
                  exit 1
                fi
              done
          echo "All hook files exist"

      - name: Install script syntax check
        run: bun build install.ts --no-bundle > /dev/null
